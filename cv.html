<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CV | Shun Li</title>

  <meta name="description" content="Curriculum vitae of Shun Li." />
  <meta name="author" content="Shun Li" />

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --text: #1f2937;
      --muted: #5f6b7a;
      --light-muted: #7d8794;
      --line: rgba(120, 140, 170, 0.14);
      --accent: #2f6fb3;
      --accent-dark: #1f568f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(91, 141, 239, 0.14), transparent 26%),
        radial-gradient(circle at 86% 16%, rgba(120, 193, 255, 0.12), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(158, 210, 190, 0.13), transparent 25%),
        linear-gradient(135deg, #edf3f9 0%, #f8fbfe 45%, #eef4f8 100%);
      color: var(--text);
      font-family: "Merriweather", "Noto Serif SC", serif;
      line-height: 1.7;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.20) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.20) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
      opacity: 0.20;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      right: -160px;
      bottom: -180px;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47, 111, 179, 0.08), transparent 68%);
      pointer-events: none;
      z-index: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 48px 44px;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
    }

    .top-nav {
      max-width: 920px;
      margin: 0 auto 42px;
      padding: 4px 0;
      background: transparent;
      border: none;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-nav-links a {
      padding: 6px 11px;
      border-radius: 999px;
      color: #334155;
      font-size: 0.94rem;
      transition: all 0.2s ease;
    }

    .top-nav-links a:hover,
    .top-nav-links a.active {
      color: var(--accent-dark);
      background: rgba(47, 111, 179, 0.08);
      text-decoration: none;
    }

    section {
      margin-bottom: 42px;
      padding: 0 0 6px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    h2 {
      margin: 0 0 18px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--line);
      font-size: 1.45rem;
      position: relative;
      color: #172033;
    }

    h2::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 72px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(47, 111, 179, 0.72), rgba(47, 111, 179, 0.10));
    }

    p {
      margin: 0 0 14px;
    }

    .cv-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .cv-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(47, 111, 179, 0.08);
      border: 1px solid rgba(47, 111, 179, 0.12);
      color: var(--accent-dark);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .cv-button:hover {
      background: rgba(47, 111, 179, 0.13);
      text-decoration: none;
    }

    .note {
      margin-top: 14px;
      color: var(--light-muted);
      font-size: 0.9rem;
    }

    footer {
      max-width: 920px;
      margin: 20px auto 0;
      padding: 18px 0 0;
      color: var(--light-muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 860px) {
      .content {
        padding: 24px 18px 36px;
      }

      .top-nav {
        justify-content: flex-start;
        margin-bottom: 32px;
      }

      .top-nav-links {
        justify-content: flex-start;
      }

      section {
        margin-bottom: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav-links">
        <a href="index.html">Home</a>
        <a href="publications.html">Publications</a>
        <a class="active" href="cv.html">CV</a>
        <a href="teaching.html">Teaching</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <main>
      <section>
        <h2>Curriculum Vitae</h2>

        <p>
          My full curriculum vitae is available as a PDF file.
        </p>

        <div class="cv-actions">
          <a class="cv-button" href="files/Shun_Li_CV.pdf" target="_blank" rel="noopener noreferrer">
            View CV
          </a>

          <a class="cv-button" href="files/Shun_Li_CV.pdf" download>
            Download CV
          </a>
        </div>

        <p class="note">
          Last updated version: <code>files/Shun_Li_CV.pdf</code>
        </p>
      </section>
    </main>

    <footer>
      &copy; <span id="current-year"></span> Shun Li. All rights reserved.
    </footer>
  </div>

  <script>
    document.getElementById("current-year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
