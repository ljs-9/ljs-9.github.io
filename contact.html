<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact</title>

  <meta name="description" content="Contact information." />
  <meta name="author" content="" />

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --text: #1f2937;
      --muted: #5f6b7a;
      --light-muted: #7d8794;
      --line: rgba(120, 140, 170, 0.14);
      --accent: #2f6fb3;
      --accent-dark: #1f568f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 12% 18%, rgba(91, 141, 239, 0.14), transparent 26%),
        radial-gradient(circle at 86% 16%, rgba(120, 193, 255, 0.12), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(158, 210, 190, 0.13), transparent 25%),
        linear-gradient(135deg, #edf3f9 0%, #f8fbfe 45%, #eef4f8 100%);
      color: var(--text);
      font-family: "Merriweather", "Noto Serif SC", serif;
      line-height: 1.7;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.20) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.20) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
      opacity: 0.20;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      right: -160px;
      bottom: -180px;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47, 111, 179, 0.08), transparent 68%);
      pointer-events: none;
      z-index: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 48px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    main {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      flex: 1;
    }

    .top-nav {
      max-width: 920px;
      width: 100%;
      margin: 0 auto 42px;
      padding: 4px 0;
      background: transparent;
      border: none;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-nav-links a {
      padding: 6px 11px;
      border-radius: 999px;
      color: #334155;
      font-size: 0.94rem;
      transition: all 0.2s ease;
    }

    .top-nav-links a:hover,
    .top-nav-links a.active {
      color: var(--accent-dark);
      background: rgba(47, 111, 179, 0.08);
      text-decoration: none;
    }

    section {
      margin-bottom: 42px;
      padding: 0 0 6px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    h2 {
      margin: 0 0 18px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--line);
      font-size: 1.45rem;
      position: relative;
      color: #172033;
    }

    h2::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 72px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(47, 111, 179, 0.72), rgba(47, 111, 179, 0.10));
    }

    h3 {
      margin: 28px 0 14px;
      padding-left: 10px;
      border-left: 3px solid rgba(47, 111, 179, 0.66);
      color: #2b3545;
      font-size: 1.12rem;
    }

    p {
      margin: 0 0 14px;
    }

    ul {
      margin: 0;
      padding-left: 22px;
    }

    li {
      margin-bottom: 8px;
    }

    .map-frame {
      width: 100%;
      margin-top: 18px;
      border: 1px solid rgba(120, 140, 170, 0.14);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.56);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.045);
    }

    .map-frame iframe {
      width: 100%;
      height: 360px;
      display: block;
      border: 0;
    }

    .map-actions {
      margin-top: 10px;
      font-size: 0.92rem;
    }

    .status-message {
      color: var(--muted);
      font-size: 0.95rem;
    }

    footer {
      width: 100%;
      max-width: 920px;
      margin: auto auto 0;
      padding: 18px 0 0;
      color: var(--light-muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 860px) {
      .content {
        padding: 24px 18px 24px;
      }

      .top-nav {
        justify-content: flex-start;
        margin-bottom: 32px;
      }

      .top-nav-links {
        justify-content: flex-start;
      }

      section {
        margin-bottom: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav-links">
        <a href="index.html">Home</a>
        <a href="publications.html">Publications</a>
        <a href="cv.html">CV</a>
        <a href="teaching.html">Teaching</a>
        <a class="active" href="contact.html">Contact</a>
      </div>
    </nav>

    <main>
      <section>
        <h2>Contact</h2>

        <p>
          <strong>Email:</strong>
          <span id="contact-email" class="status-message">Loading...</span>
        </p>

        <p>
          <strong>Location:</strong>
          <span id="contact-address" class="status-message">Loading...</span>
        </p>

        <div id="map-container"></div>
      </section>
    </main>

    <footer>
      &copy; <span id="current-year"></span> <span id="footer-name"></span>. All rights reserved.
    </footer>
  </div>

  <script>
    const PROFILE_URL = "./data/profile.json";

    const contactEmail = document.getElementById("contact-email");
    const contactAddress = document.getElementById("contact-address");
    const mapContainer = document.getElementById("map-container");
    const currentYear = document.getElementById("current-year");
    const footerName = document.getElementById("footer-name");

    currentYear.textContent = new Date().getFullYear();

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMap(query, label) {
      if (!query) {
        mapContainer.innerHTML = "";
        return;
      }

      const encodedQuery = encodeURIComponent(query);
      const safeLabel = escapeHTML(label || query);
      const mapURL = `https://www.google.com/maps?q=${encodedQuery}&output=embed`;
      const externalURL = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

      mapContainer.innerHTML = `
        <div class="map-frame">
          <iframe
            title="Google Map for ${safeLabel}"
            src="${mapURL}"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen
          ></iframe>
        </div>
        <p class="map-actions">
          <a href="${externalURL}" target="_blank" rel="noopener noreferrer">
            Open in Google Maps
          </a>
        </p>
      `;
    }

    async function loadProfile() {
      try {
        const response = await fetch(PROFILE_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const profile = await response.json();
        const name = profile.name || "Personal Homepage";
        const email = profile.email || "";
        const address = profile.address || "";
        const mapQuery = profile.mapQuery || address;

        document.title = `Contact | ${name}`;
        footerName.textContent = name;

        const authorMeta = document.querySelector('meta[name="author"]');
        const descriptionMeta = document.querySelector('meta[name="description"]');

        if (authorMeta) authorMeta.setAttribute("content", name);
        if (descriptionMeta) descriptionMeta.setAttribute("content", `Contact information of ${name}.`);

        contactEmail.classList.remove("status-message");
        contactAddress.classList.remove("status-message");

        contactEmail.innerHTML = email
          ? `<a href="mailto:${escapeHTML(email)}">${escapeHTML(email)}</a>`
          : `<span class="status-message">Email unavailable.</span>`;

        contactAddress.textContent = address || "Location unavailable.";
        renderMap(mapQuery, address);
      } catch (error) {
        console.error("Error loading profile:", error);

        footerName.textContent = "Personal Homepage";
        contactEmail.textContent = "Email unavailable.";
        contactAddress.textContent = "Location unavailable.";
        mapContainer.innerHTML = "";
      }
    }

    loadProfile();
  </script>
</body>
</html>
