name: Update Google Scholar Publications

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at UTC 00:00, Beijing time 08:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Backup existing publications
        run: |
          if [ -f data/publications.json ]; then
            cp data/publications.json data/publications.backup.json
            echo "Existing publications.json backed up."
          else
            echo "No existing publications.json found."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run update script
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/update_publications.py

      - name: Validate publications file
        run: |
          python - <<'PY'
          import json
          import os

          path = "data/publications.json"

          if not os.path.exists(path):
              raise SystemExit("data/publications.json does not exist.")

          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          if not isinstance(data, list) or len(data) == 0:
              raise SystemExit("data/publications.json is empty or invalid.")

          print(f"Validated publications.json with {len(data)} publications.")
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/publications.json

          if git diff --cached --quiet; then
            echo "No publication changes detected."
          else
            git commit -m "Auto update Google Scholar publications [$(date '+%Y-%m-%d')]"
            git push
            echo "Updated publications.json:"
            head -n 80 data/publications.json
          fi
