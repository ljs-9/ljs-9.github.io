<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Publications | Shun Li</title>

  <meta name="description" content="Publications of Shun Li." />
  <meta name="author" content="Shun Li" />

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --text: #1f2937;
      --muted: #5f6b7a;
      --light-muted: #7d8794;
      --line: rgba(120, 140, 170, 0.13);
      --accent: #2f6fb3;
      --accent-dark: #1f568f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(91, 141, 239, 0.16), transparent 26%),
        radial-gradient(circle at 86% 16%, rgba(120, 193, 255, 0.14), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(158, 210, 190, 0.16), transparent 25%),
        linear-gradient(135deg, #edf3f9 0%, #f8fbfe 45%, #eef4f8 100%);
      color: var(--text);
      font-family: "Merriweather", "Noto Serif SC", serif;
      line-height: 1.7;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
      opacity: 0.22;
      z-index: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 48px 44px;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
    }

    .top-nav {
      max-width: 920px;
      margin: 0 auto 28px;
      padding: 14px 22px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow:
        0 6px 18px rgba(31, 41, 55, 0.03),
        0 1px 4px rgba(31, 41, 55, 0.018);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .top-nav-title {
      font-weight: 700;
      color: #172033;
      white-space: nowrap;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-nav-links a {
      padding: 7px 12px;
      border-radius: 999px;
      color: #334155;
      font-size: 0.94rem;
      transition: all 0.2s ease;
    }

    .top-nav-links a:hover,
    .top-nav-links a.active {
      color: var(--accent-dark);
      background: rgba(47, 111, 179, 0.09);
      text-decoration: none;
    }

    section {
      margin-bottom: 46px;
      padding: 28px 32px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow:
        0 8px 22px rgba(31, 41, 55, 0.032),
        0 1px 4px rgba(31, 41, 55, 0.02);
    }

    h2 {
      margin: 0 0 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      font-size: 1.45rem;
      position: relative;
      color: #172033;
    }

    h2::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 72px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(47, 111, 179, 0.78), rgba(47, 111, 179, 0.12));
    }

    h3 {
      margin: 28px 0 14px;
      padding-left: 10px;
      border-left: 3px solid rgba(47, 111, 179, 0.72);
      color: #2b3545;
      font-size: 1.12rem;
    }

    .publication-year {
      margin-top: 24px;
    }

    .publication-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .publication-item {
      margin-bottom: 18px;
      padding: 16px 0 18px;
      border-bottom: 1px solid rgba(120, 140, 170, 0.13);
    }

    .publication-item:first-child {
      padding-top: 0;
    }

    .publication-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .publication-title {
      font-weight: 700;
      color: #172033;
    }

    .publication-meta {
      color: var(--muted);
    }

    .publication-links {
      margin-top: 7px;
      font-size: 0.92rem;
    }

    .publication-links a {
      margin-right: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status-message {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .note {
      margin-top: 10px;
      color: var(--light-muted);
      font-size: 0.88rem;
    }

    footer {
      max-width: 920px;
      margin: 20px auto 0;
      padding: 18px 0 0;
      color: var(--light-muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 860px) {
      .content {
        padding: 24px 18px 36px;
      }

      .top-nav {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px 18px;
      }

      .top-nav-links {
        justify-content: flex-start;
      }

      section {
        padding: 22px 20px;
        margin-bottom: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav-title">Academic Homepage</div>

      <div class="top-nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="publications.html">Publications</a>
        <a href="cv.html">CV</a>
        <a href="teaching.html">Teaching</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <main>
      <section id="publications">
        <h2>Publications</h2>

        <div id="publications-container">
          <p class="status-message">Loading publications...</p>
        </div>
      </section>
    </main>

    <footer>
      &copy; <span id="current-year"></span> Shun Li. All rights reserved.
    </footer>
  </div>

  <script>
    const PUBLICATIONS_URL = "./data/publications.json";
    const CACHE_KEY = "shun_li_publications_cache_v1";

    const publicationsContainer = document.getElementById("publications-container");
    const currentYear = document.getElementById("current-year");

    currentYear.textContent = new Date().getFullYear();

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normaliseDOI(doi) {
      if (!doi) return "";

      const cleanDOI = String(doi).trim();

      if (!cleanDOI) return "";
      if (cleanDOI.startsWith("http://") || cleanDOI.startsWith("https://")) {
        return cleanDOI;
      }

      return `https://doi.org/${cleanDOI}`;
    }

    function normalisePDFPath(pdf) {
      if (!pdf) return "";

      const cleanPDF = String(pdf).trim();

      if (!cleanPDF) return "";

      if (
        cleanPDF.startsWith("http://") ||
        cleanPDF.startsWith("https://") ||
        cleanPDF.startsWith("./") ||
        cleanPDF.startsWith("/")
      ) {
        return cleanPDF;
      }

      if (cleanPDF.startsWith("papers/")) {
        return cleanPDF;
      }

      return `papers/${cleanPDF}`;
    }

    function isPDFLink(url) {
      return typeof url === "string" && url.toLowerCase().endsWith(".pdf");
    }

    function formatPublicationLinks(pub) {
      const links = [];

      const doiURL = normaliseDOI(pub.doi);
      if (doiURL) {
        links.push(`
          <a href="${escapeHTML(doiURL)}" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-link"></i> DOI
          </a>
        `);
      }

      const pdfURL = normalisePDFPath(pub.pdf);
      if (pdfURL && isPDFLink(pdfURL)) {
        links.push(`
          <a href="${escapeHTML(pdfURL)}" target="_blank" rel="noopener noreferrer">
            <i class="fa-regular fa-file-pdf"></i> PDF
          </a>
        `);
      }

      const scholarURL = pub.scholar ? String(pub.scholar).trim() : "";
      if (scholarURL) {
        links.push(`
          <a href="${escapeHTML(scholarURL)}" target="_blank" rel="noopener noreferrer">
            <i class="ai ai-google-scholar"></i> Scholar
          </a>
        `);
      }

      return links.length ? `<div class="publication-links">${links.join("")}</div>` : "";
    }

    function getYear(pub) {
      if (!pub || !pub.year) return "Forthcoming";

      const year = String(pub.year).trim();
      return year || "Forthcoming";
    }

    function sortYearsDescending(years) {
      return years.sort((a, b) => {
        const yearA = parseInt(a, 10);
        const yearB = parseInt(b, 10);

        if (Number.isNaN(yearA) && Number.isNaN(yearB)) return a.localeCompare(b);
        if (Number.isNaN(yearA)) return 1;
        if (Number.isNaN(yearB)) return -1;

        return yearB - yearA;
      });
    }

    function renderPublications(data, options = {}) {
      const fromCache = options.fromCache || false;

      if (!Array.isArray(data) || data.length === 0) {
        publicationsContainer.innerHTML = `
          <p class="status-message">
            Publication information is currently unavailable. Please visit Google Scholar for the latest list.
          </p>
        `;
        return;
      }

      const grouped = data.reduce((acc, pub) => {
        const year = getYear(pub);
        if (!acc[year]) acc[year] = [];
        acc[year].push(pub);
        return acc;
      }, {});

      const years = sortYearsDescending(Object.keys(grouped));

      let html = "";

      if (fromCache) {
        html += `
          <p class="note">
            Displaying the most recently available publication list.
          </p>
        `;
      }

      years.forEach(year => {
        html += `<div class="publication-year"><h3>${escapeHTML(year)}</h3><ul class="publication-list">`;

        grouped[year].forEach(pub => {
          const authors = escapeHTML(pub.authors || "");
          const title = escapeHTML(pub.title || "Untitled");
          const journal = escapeHTML(pub.journal || "");
          const pages = pub.pages ? `, ${escapeHTML(pub.pages)}` : "";
          const yearText = escapeHTML(pub.year || year);
          const citations = Number(pub.citations) > 0
            ? `<span class="publication-meta">Citations: ${Number(pub.citations)}</span>`
            : "";

          html += `
            <li class="publication-item">
              <div>
                ${authors ? `${authors} ` : ""}(${yearText}).
                <span class="publication-title">${title}</span>.
                ${journal ? `<em>${journal}</em>${pages}.` : ""}
              </div>
              ${formatPublicationLinks(pub)}
              ${citations ? `<div class="publication-links">${citations}</div>` : ""}
            </li>
          `;
        });

        html += "</ul></div>";
      });

      publicationsContainer.innerHTML = html;
    }

    function readCachedPublications() {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (!cached) return null;

        const parsed = JSON.parse(cached);
        return Array.isArray(parsed) && parsed.length > 0 ? parsed : null;
      } catch (error) {
        console.warn("Failed to read cached publications:", error);
        return null;
      }
    }

    function cachePublications(data) {
      try {
        if (Array.isArray(data) && data.length > 0) {
          localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        }
      } catch (error) {
        console.warn("Failed to cache publications:", error);
      }
    }

    async function loadPublications() {
      try {
        const response = await fetch(PUBLICATIONS_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {
          const cached = readCachedPublications();

          if (cached) {
            renderPublications(cached, { fromCache: true });
          } else {
            renderPublications([]);
          }

          return;
        }

        cachePublications(data);
        renderPublications(data);
      } catch (error) {
        console.error("Error loading publications:", error);

        const cached = readCachedPublications();

        if (cached) {
          renderPublications(cached, { fromCache: true });
        } else {
          publicationsContainer.innerHTML = `
            <p class="status-message">
              Publication information is temporarily unavailable. Please visit Google Scholar for the latest list.
            </p>
          `;
        }
      }
    }

    loadPublications();
  </script>
</body>
</html>
