<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Publications | Shun Li</title>

  <meta name="description" content="Publications of Shun Li." />
  <meta name="author" content="Shun Li" />

  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --text: #1f2937;
      --muted: #5f6b7a;
      --light-muted: #7d8794;
      --line: rgba(120, 140, 170, 0.14);
      --accent: #2f6fb3;
      --accent-dark: #1f568f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 12% 18%, rgba(91, 141, 239, 0.14), transparent 26%),
        radial-gradient(circle at 86% 16%, rgba(120, 193, 255, 0.12), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(158, 210, 190, 0.13), transparent 25%),
        linear-gradient(135deg, #edf3f9 0%, #f8fbfe 45%, #eef4f8 100%);
      color: var(--text);
      font-family: "Merriweather", "Noto Serif SC", serif;
      line-height: 1.7;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.20) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.20) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
      opacity: 0.20;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      right: -160px;
      bottom: -180px;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47, 111, 179, 0.08), transparent 68%);
      pointer-events: none;
      z-index: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 48px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    main {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      flex: 1;
    }

    .top-nav {
      max-width: 960px;
      width: 100%;
      margin: 0 auto 42px;
      padding: 4px 0;
      background: transparent;
      border: none;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .top-nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-nav-links a {
      padding: 6px 11px;
      border-radius: 999px;
      color: #334155;
      font-size: 0.94rem;
      transition: all 0.2s ease;
    }

    .top-nav-links a:hover,
    .top-nav-links a.active {
      color: var(--accent-dark);
      background: rgba(47, 111, 179, 0.08);
      text-decoration: none;
    }

    section {
      margin-bottom: 42px;
      padding: 0 0 6px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    h2 {
      margin: 0 0 18px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--line);
      font-size: 1.45rem;
      position: relative;
      color: #172033;
    }

    h2::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 72px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(47, 111, 179, 0.72), rgba(47, 111, 179, 0.10));
    }

    h3 {
      margin: 30px 0 14px;
      padding-left: 10px;
      border-left: 3px solid rgba(47, 111, 179, 0.66);
      color: #2b3545;
      font-size: 1.12rem;
    }

    .publication-year {
      margin-top: 26px;
    }

    .publication-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .publication-item {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
      margin-bottom: 22px;
      padding: 18px 0 22px;
      border-bottom: 1px solid rgba(120, 140, 170, 0.14);
    }

    .publication-item:first-child {
      padding-top: 0;
    }

    .publication-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .publication-thumb {
      width: 100%;
    }

    .publication-thumb-button {
      width: 100%;
      padding: 0;
      border: 0;
      border-radius: 10px;
      display: block;
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
      background: transparent;
      color: inherit;
      font: inherit;
    }

    .publication-thumb-button::after {
      content: "\f00e";
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: rgba(23, 32, 51, 0.68);
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .publication-thumb-button:hover::after,
    .publication-thumb-button:focus-visible::after {
      opacity: 1;
      transform: translateY(0);
    }

    .publication-thumb-button:focus-visible {
      outline: 3px solid rgba(47, 111, 179, 0.35);
      outline-offset: 3px;
    }

    .publication-thumb-button img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      border: 1px solid rgba(120, 140, 170, 0.10);
      background: rgba(255, 255, 255, 0.42);
    }

    .publication-content {
      min-width: 0;
    }

    .publication-title {
      font-weight: 700;
      color: #172033;
    }

    .publication-meta {
      color: var(--muted);
    }

    .publication-links {
      margin-top: 8px;
      font-size: 0.92rem;
    }

    .publication-links a {
      margin-right: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status-message {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .note {
      margin-top: 10px;
      color: var(--light-muted);
      font-size: 0.88rem;
    }

    body.lightbox-open {
      overflow: hidden;
    }

    .image-lightbox[hidden] {
      display: none;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      padding: 0;
      cursor: zoom-out;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .lightbox-panel {
      width: min(1080px, 94vw);
      max-height: 92vh;
      margin: 0;
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
    }

    .lightbox-panel img {
      width: 100%;
      max-height: calc(92vh - 64px);
      object-fit: contain;
      display: block;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.30);
    }

    .lightbox-panel figcaption {
      color: #ffffff;
      text-align: center;
      font-size: 0.95rem;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
    }

    .lightbox-close {
      position: absolute;
      top: -16px;
      right: -16px;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #172033;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .lightbox-close:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.65);
      outline-offset: 3px;
    }

    footer {
      width: 100%;
      max-width: 960px;
      margin: auto auto 0;
      padding: 18px 0 0;
      color: var(--light-muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 760px) {
      .publication-item {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .publication-thumb {
        max-width: 280px;
      }

      .image-lightbox {
        padding: 18px;
      }

      .lightbox-close {
        top: -12px;
        right: -8px;
      }
    }

    @media (max-width: 860px) {
      .content {
        padding: 24px 18px 24px;
      }

      .top-nav {
        justify-content: flex-start;
        margin-bottom: 32px;
      }

      .top-nav-links {
        justify-content: flex-start;
      }

      section {
        margin-bottom: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <nav class="top-nav" aria-label="Main navigation">
      <div class="top-nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="publications.html">Publications</a>
        <a href="cv.html">CV</a>
        <a href="teaching.html">Teaching</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <main>
      <section id="publications">
        <h2>Publications(SSCI)</h2>

        <div id="publications-container">
          <p class="status-message">Loading publications...</p>
        </div>
      </section>
    </main>

    <footer>
      &copy; <span id="current-year"></span> Shun Li. All rights reserved.
    </footer>
  </div>

  <div class="image-lightbox" id="publication-lightbox" role="dialog" aria-label="Publication image preview" aria-hidden="true" hidden>
    <button class="lightbox-backdrop" type="button" data-lightbox-close aria-label="Close image preview"></button>
    <figure class="lightbox-panel">
      <button class="lightbox-close" type="button" data-lightbox-close aria-label="Close image preview">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <img id="lightbox-image" alt="" />
      <figcaption id="lightbox-caption"></figcaption>
    </figure>
  </div>

  <script>
    const PUBLICATIONS_URL = "./data/publications.json";
    const CACHE_KEY = "shun_li_publications_cache_v1";
    const DEFAULT_PUBLICATION_IMAGE = "images/publications/default.svg";

    const publicationsContainer = document.getElementById("publications-container");
    const currentYear = document.getElementById("current-year");
    const publicationLightbox = document.getElementById("publication-lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxCaption = document.getElementById("lightbox-caption");
    const lightboxCloseButton = publicationLightbox.querySelector(".lightbox-close");

    currentYear.textContent = new Date().getFullYear();

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normaliseDOI(doi) {
      if (!doi) return "";

      const cleanDOI = String(doi).trim();

      if (!cleanDOI) return "";
      if (cleanDOI.startsWith("http://") || cleanDOI.startsWith("https://")) {
        return cleanDOI;
      }

      return `https://doi.org/${cleanDOI}`;
    }

    function normalisePDFPath(pdf) {
      if (!pdf) return "";

      const cleanPDF = String(pdf).trim();

      if (!cleanPDF) return "";

      if (
        cleanPDF.startsWith("http://") ||
        cleanPDF.startsWith("https://") ||
        cleanPDF.startsWith("./") ||
        cleanPDF.startsWith("/")
      ) {
        return cleanPDF;
      }

      if (cleanPDF.startsWith("papers/")) {
        return cleanPDF;
      }

      return `papers/${cleanPDF}`;
    }

    function normaliseAttachmentPath(file) {
      if (!file) return "";

      const cleanFile = String(file).trim();

      if (!cleanFile) return "";

      if (
        cleanFile.startsWith("http://") ||
        cleanFile.startsWith("https://") ||
        cleanFile.startsWith("./") ||
        cleanFile.startsWith("/") ||
        cleanFile.startsWith("attachments/")
      ) {
        return cleanFile;
      }

      return `attachments/publications/${cleanFile}`;
    }

    function getAttachmentFile(attachment) {
      if (!attachment) return "";

      if (typeof attachment === "string") {
        return normaliseAttachmentPath(attachment);
      }

      return normaliseAttachmentPath(
        attachment.file ||
        attachment.path ||
        attachment.url ||
        attachment.href ||
        ""
      );
    }

    function getAttachmentLabel(attachment, index, total) {
      if (attachment && typeof attachment === "object") {
        const label = attachment.label || attachment.name || attachment.title;

        if (label && String(label).trim()) {
          return String(label).trim();
        }
      }

      return total > 1 ? `Attachment ${index + 1}` : "Attachment";
    }

    function getPublicationAttachments(pub) {
      const rawAttachments = Array.isArray(pub.attachments)
        ? pub.attachments
        : (pub.attachment ? [pub.attachment] : []);

      return rawAttachments
        .map((attachment, index) => {
          const href = getAttachmentFile(attachment);

          if (!href) return null;

          return {
            href,
            label: getAttachmentLabel(attachment, index, rawAttachments.length),
          };
        })
        .filter(Boolean);
    }

    function isPDFLink(url) {
      return typeof url === "string" && url.toLowerCase().endsWith(".pdf");
    }

    function normalisePublicationImage(image) {
      if (!image) return "";

      const cleanImage = String(image).trim();

      if (!cleanImage) return "";

      if (
        cleanImage.startsWith("http://") ||
        cleanImage.startsWith("https://") ||
        cleanImage.startsWith("./") ||
        cleanImage.startsWith("/") ||
        cleanImage.startsWith("images/")
      ) {
        return cleanImage;
      }

      return `images/publications/${cleanImage}`;
    }

    function getPublicationImage(pub) {
      const localImage = normalisePublicationImage(pub.image);

      if (localImage) {
        return localImage;
      }

      if (pub.slug && String(pub.slug).trim()) {
        return `images/publications/${String(pub.slug).trim()}.jpg`;
      }

      return DEFAULT_PUBLICATION_IMAGE;
    }

    function openPublicationImage(src, alt) {
      if (!src) return;

      lightboxImage.src = src;
      lightboxImage.alt = alt || "Publication image";
      lightboxCaption.textContent = alt || "";
      publicationLightbox.hidden = false;
      publicationLightbox.setAttribute("aria-hidden", "false");
      document.body.classList.add("lightbox-open");
      lightboxCloseButton.focus();
    }

    function closePublicationImage() {
      publicationLightbox.hidden = true;
      publicationLightbox.setAttribute("aria-hidden", "true");
      document.body.classList.remove("lightbox-open");
      lightboxImage.removeAttribute("src");
    }

    function formatPublicationLinks(pub) {
      const links = [];

      const doiURL = normaliseDOI(pub.doi);
      if (doiURL) {
        links.push(`
          <a href="${escapeHTML(doiURL)}" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-link"></i> DOI
          </a>
        `);
      }

      const pdfURL = normalisePDFPath(pub.pdf);
      if (pdfURL && isPDFLink(pdfURL)) {
        links.push(`
          <a href="${escapeHTML(pdfURL)}" target="_blank" rel="noopener noreferrer">
            <i class="fa-regular fa-file-pdf"></i> PDF
          </a>
        `);
      }

      getPublicationAttachments(pub).forEach(attachment => {
        links.push(`
          <a href="${escapeHTML(attachment.href)}" target="_blank" rel="noopener noreferrer" download>
            <i class="fa-solid fa-paperclip"></i> ${escapeHTML(attachment.label)}
          </a>
        `);
      });

      return links.length ? `<div class="publication-links">${links.join("")}</div>` : "";
    }

    function getYear(pub) {
      if (!pub || !pub.year) return "Forthcoming";
      const year = String(pub.year).trim();
      return year || "Forthcoming";
    }

    function sortYearsDescending(years) {
      return years.sort((a, b) => {
        const yearA = parseInt(a, 10);
        const yearB = parseInt(b, 10);

        if (Number.isNaN(yearA) && Number.isNaN(yearB)) return a.localeCompare(b);
        if (Number.isNaN(yearA)) return 1;
        if (Number.isNaN(yearB)) return -1;

        return yearB - yearA;
      });
    }

    function renderPublications(data, options = {}) {
      const fromCache = options.fromCache || false;

      if (!Array.isArray(data) || data.length === 0) {
        publicationsContainer.innerHTML = `
          <p class="status-message">
            Publication information is currently unavailable. Please visit Google Scholar for the latest list.
          </p>
        `;
        return;
      }

      const grouped = data.reduce((acc, pub) => {
        const year = getYear(pub);
        if (!acc[year]) acc[year] = [];
        acc[year].push(pub);
        return acc;
      }, {});

      const years = sortYearsDescending(Object.keys(grouped));

      let html = "";

      if (fromCache) {
        html += `
          <p class="note">
            Displaying the most recently available publication list.
          </p>
        `;
      }

      years.forEach(year => {
        html += `<div class="publication-year"><h3>${escapeHTML(year)}</h3><ul class="publication-list">`;

        grouped[year].forEach(pub => {
          const authors = escapeHTML(pub.authors || "");
          const title = escapeHTML(pub.title || "Untitled");
          const journal = escapeHTML(pub.journal || "");
          const pages = pub.pages ? `, ${escapeHTML(pub.pages)}` : "";
          const yearText = escapeHTML(pub.year || year);
          const imageURL = getPublicationImage(pub);

          const citations = Number(pub.citations) > 0
            ? `<span class="publication-meta">Citations: ${Number(pub.citations)}</span>`
            : "";

          html += `
            <li class="publication-item">
              <div class="publication-thumb">
                <button
                  class="publication-thumb-button"
                  type="button"
                  data-image-preview
                  data-image-src="${escapeHTML(imageURL)}"
                  data-image-alt="${title}"
                  aria-label="View larger image for ${title}"
                >
                  <img
                    src="${escapeHTML(imageURL)}"
                    alt="${title}"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='${DEFAULT_PUBLICATION_IMAGE}';this.closest('[data-image-preview]').dataset.imageSrc='${DEFAULT_PUBLICATION_IMAGE}';"
                  />
                </button>
              </div>

              <div class="publication-content">
                <div>
                  ${authors ? `${authors} ` : ""}(${yearText}).
                  <span class="publication-title">${title}</span>.
                  ${journal ? `<em>${journal}</em>${pages}.` : ""}
                </div>

                ${formatPublicationLinks(pub)}
                ${citations ? `<div class="publication-links">${citations}</div>` : ""}
              </div>
            </li>
          `;
        });

        html += "</ul></div>";
      });

      publicationsContainer.innerHTML = html;
    }

    publicationsContainer.addEventListener("click", event => {
      const trigger = event.target.closest("[data-image-preview]");

      if (!trigger) return;

      openPublicationImage(trigger.dataset.imageSrc, trigger.dataset.imageAlt);
    });

    publicationLightbox.addEventListener("click", event => {
      if (event.target.closest("[data-lightbox-close]")) {
        closePublicationImage();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !publicationLightbox.hidden) {
        closePublicationImage();
      }
    });

    function readCachedPublications() {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (!cached) return null;

        const parsed = JSON.parse(cached);
        return Array.isArray(parsed) && parsed.length > 0 ? parsed : null;
      } catch (error) {
        console.warn("Failed to read cached publications:", error);
        return null;
      }
    }

    function cachePublications(data) {
      try {
        if (Array.isArray(data) && data.length > 0) {
          localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        }
      } catch (error) {
        console.warn("Failed to cache publications:", error);
      }
    }

    async function loadPublications() {
      try {
        const response = await fetch(PUBLICATIONS_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {
          const cached = readCachedPublications();

          if (cached) {
            renderPublications(cached, { fromCache: true });
          } else {
            renderPublications([]);
          }

          return;
        }

        cachePublications(data);
        renderPublications(data);
      } catch (error) {
        console.error("Error loading publications:", error);

        const cached = readCachedPublications();

        if (cached) {
          renderPublications(cached, { fromCache: true });
        } else {
          publicationsContainer.innerHTML = `
            <p class="status-message">
              Publication information is temporarily unavailable. Please visit Google Scholar for the latest list.
            </p>
          `;
        }
      }
    }

    loadPublications();
  </script>
</body>
</html>
